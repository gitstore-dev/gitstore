name: CI

on:
  push:
    branches: [ main, 'feature/**', '[0-9]+-*' ]
  pull_request:
    branches: [ main ]
  merge_group:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  proto-breaking:
    name: Proto Breaking Change Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        version: 1.69.0
        setup_only: true

    - name: Lint proto files
      run: buf lint shared/proto/

    - name: Check for breaking changes
      run: buf breaking shared/proto/ --against '.git#branch=main'

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gitstore-git-service

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install protoc
      run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          gitstore-git-service/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose

    - name: Generate test coverage
      run: |
        cargo install cargo-tarpaulin || true
        cargo tarpaulin --out Xml --output-dir ./coverage
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./gitstore-git-service/coverage/cobertura.xml
        flags: rust
        name: rust-coverage
      continue-on-error: true

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gitstore-api

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
        cache-dependency-path: gitstore-api/go.sum

    - name: Install dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "The following files need formatting:"
          gofmt -s -l .
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Run staticcheck
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@latest
        staticcheck ./...

    - name: Build
      run: go build -v ./...

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./gitstore-api/coverage.txt
        flags: go
        name: go-coverage
      continue-on-error: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-test, go-test]
    if: |
      contains(github.event.pull_request.labels.*.name, 'integration') ||
      github.ref == 'refs/heads/main' ||
      github.event_name == 'merge_group'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
        cache-dependency-path: tests/integration/go.sum

    - name: Set up Docker Compose
      uses: docker/setup-compose-action@v2

    - name: Initialise demo catalog
      run: ./scripts/init-demo-catalog.sh --data-dir ./data/repos
      env:
        GITSTORE_DATA_DIR: ./data/repos

    - name: Build and start core stack
      run: |
        docker compose up -d --build
      env:
        GITSTORE_DATA_DIR: ./data/repos

    - name: Wait for services to be healthy
      run: |
        echo "Waiting for gitstore-git-service..."
        timeout 60 sh -c 'until curl -sf http://localhost:9418/health; do sleep 2; done'
        echo "Waiting for gitstore-api..."
        timeout 60 sh -c 'until curl -sf http://localhost:4000/health; do sleep 2; done'
        docker compose ps

    - name: Run integration tests
      working-directory: ./tests/integration
      run: go test -v -timeout 120s ./...

    - name: Collect logs on failure
      if: failure()
      run: docker compose logs

    - name: Cleanup
      if: always()
      run: docker compose down -v

  grpc-integration-test:
    name: gRPC Integration Tests (testcontainers)
    runs-on: ubuntu-latest
    needs: [rust-test, go-test]
    if: |
      contains(github.event.pull_request.labels.*.name, 'integration') ||
      github.ref == 'refs/heads/main' ||
      github.event_name == 'merge_group'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
        cache-dependency-path: gitstore-api/go.sum

    - name: Build git-service Docker image
      run: docker build -f docker/git-service.Dockerfile -t gitstore-git-service:latest .

    - name: Run gRPC integration tests
      working-directory: ./gitstore-api
      run: go test -tags integration -v -timeout 5m ./tests/integration/...

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

    - name: Audit Rust dependencies
      working-directory: ./gitstore-git-service
      run: |
        cargo install cargo-audit || true
        cargo audit
      continue-on-error: true

    - name: Audit Go dependencies
      working-directory: ./gitstore-api
      run: |
        go install github.com/sonatype-nexus-community/nancy@latest
        go list -json -m all | nancy sleuth
      continue-on-error: true

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [proto-breaking, rust-test, go-test, integration-test, grpc-integration-test, security-scan]
    if: always()

    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.rust-test.result }}" != "success" ] || \
           [ "${{ needs.go-test.result }}" != "success" ]; then
          echo "Build failed!"
          exit 1
        fi
        for job in integration-test grpc-integration-test; do
          result=$(eval echo \${{ needs.${job}.result }})
          if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
            echo "$job failed (result: $result)"
            exit 1
          fi
        done
        echo "All checks passed! ✅"
