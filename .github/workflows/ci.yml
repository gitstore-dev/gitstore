name: CI

on:
  push:
    branches: [ main, 'feature/**', '[0-9]+-*' ]
  pull_request:
    branches: [ main ]
  merge_group:
    branches: [ main ]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gitstore-git-service

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install protoc
      run: sudo apt-get update -qq && sudo apt-get install -y protobuf-compiler

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          gitstore-git-service/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose

    - name: Generate test coverage
      run: |
        cargo install cargo-tarpaulin || true
        cargo tarpaulin --out Xml --output-dir ./coverage
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./gitstore-git-service/coverage/cobertura.xml
        flags: rust
        name: rust-coverage
      continue-on-error: true

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./gitstore-api

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.x'
        cache-dependency-path: gitstore-api/go.sum

    - name: Install dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "The following files need formatting:"
          gofmt -s -l .
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Run staticcheck
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@latest
        staticcheck ./...

    - name: Build
      run: go build -v ./...

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./gitstore-api/coverage.txt
        flags: go
        name: go-coverage
      continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - uses: actions/checkout@v6

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true

    - name: Audit Rust dependencies
      working-directory: ./gitstore-git-service
      run: |
        cargo install cargo-audit || true
        cargo audit
      continue-on-error: true

    - name: Audit Go dependencies
      working-directory: ./gitstore-api
      run: |
        go install github.com/sonatype-nexus-community/nancy@latest
        go list -json -m all | nancy sleuth
      continue-on-error: true

  shellout-guards:
    name: Shell-out Guards
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Ensure no git binary shell-outs in git-service
      run: |
        if grep -rn 'Command::new("git")' gitstore-git-service/src/; then
          echo "ERROR: git binary shell-out found in gitstore-git-service/src/" >&2
          exit 1
        fi
        echo "No git shell-outs found. ✅"

    - name: Ensure init-demo-catalog references are removed
      run: |
        if grep -rn 'init-demo-catalog' \
            --exclude-dir='.git' \
            --exclude-dir='specs' \
            --exclude-dir='.claude' \
            --exclude='ci.yml' \
            .; then
          echo "ERROR: init-demo-catalog reference found in source files" >&2
          exit 1
        fi
        echo "No init-demo-catalog references found. ✅"

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [rust-test, go-test, security-scan, shellout-guards]
    if: always()

    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.rust-test.result }}" != "success" ] || \
           [ "${{ needs.go-test.result }}" != "success" ] || \
           [ "${{ needs.shellout-guards.result }}" != "success" ]; then
          echo "Build failed!"
          exit 1
        fi
        echo "All checks passed! ✅"
