name: CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true
env:
  REGISTRY: ghcr.io
  GIT_SERVICE_IMAGE: ${{ github.repository_owner }}/git-service
  API_IMAGE: ${{ github.repository_owner }}/api
  ADMIN_IMAGE: ${{ github.repository_owner }}/admin

jobs:
  build-git-service-image:
    name: Build and Push Git Service Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Git Service
      id: meta-git-service
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.GIT_SERVICE_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Git Service image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./docker/git-service.Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta-git-service.outputs.tags }}
        labels: ${{ steps.meta-git-service.outputs.labels }}
        cache-from: type=gha,scope=git-service
        cache-to: type=gha,mode=max,scope=git-service
        outputs: >-
          type=image,name=target,"annotation-index.org.opencontainers.image.description=GitStore git service with built-in Git protocol handling, validation hooks, and websocket notifications"

  build-api-image:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for API
      id: meta-api
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push API image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./docker/api.Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta-api.outputs.tags }}
        labels: ${{ steps.meta-api.outputs.labels }}
        cache-from: type=gha,scope=api
        cache-to: type=gha,mode=max,scope=api
        outputs: >-
          type=image,name=target,"annotation-index.org.opencontainers.image.description=GitStore GraphQL API service for querying and publishing catalog data backed by the git service"

  build-admin-image:
    name: Build and Push Admin Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Admin
      id: meta-admin
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.ADMIN_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Admin image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./docker/admin.Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta-admin.outputs.tags }}
        labels: ${{ steps.meta-admin.outputs.labels }}
        cache-from: type=gha,scope=admin
        cache-to: type=gha,mode=max,scope=admin
        outputs: >-
          type=image,name=target,"annotation-index.org.opencontainers.image.description=GitStore admin web interface for managing products, categories, collections, and catalog publishing"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build-git-service-image, build-api-image, build-admin-image]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://sandbox.gitstore.dev

    steps:
    - uses: actions/checkout@v6

    - name: Deploy to staging
      run: |
        echo "Deploying to staging environment..."
        # TODO: Add actual deployment commands
        # Example: kubectl apply -f k8s/staging/ or similar
        echo "Deployment placeholder - configure with your infrastructure"

    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."
        # TODO: Add smoke test commands
        # Example: curl health endpoints, basic API tests
        echo "Smoke tests placeholder"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-git-service-image, build-api-image, build-admin-image, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://cloud.gitstore.dev

    steps:
    - uses: actions/checkout@v6

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: ncipollo/release-action@v1
      with:
        generateReleaseNotes: true
        draft: false
        prerelease: false

    - name: Deploy to production
      run: |
        echo "Deploying to production environment..."
        # TODO: Add actual deployment commands
        echo "Production deployment placeholder - configure with your infrastructure"

    - name: Run smoke tests
      run: |
        echo "Running production smoke tests..."
        # TODO: Add production smoke test commands
        echo "Production smoke tests placeholder"

    - name: Notify deployment
      run: |
        echo "Notifying team of production deployment..."
        # TODO: Add notification logic (Slack, email, etc.)

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: [deploy-staging, deploy-production]

    steps:
    - name: Rollback to previous version
      run: |
        echo "Rolling back deployment..."
        # TODO: Add rollback commands
        echo "Rollback placeholder"

    - name: Notify rollback
      run: |
        echo "Notifying team of rollback..."
        # TODO: Add notification logic
