# Product Queries

query GetProducts($first: Int, $after: String, $filter: ProductFilter) {
  products(first: $first, after: $after, filter: $filter) {
    edges {
      node {
        id
        title
        sku
        price
        compareAtPrice
        inventoryStatus
        inventoryQuantity
        description
        categoryId
        collectionIds
        images
        metadata
        createdAt
        updatedAt
        version
      }
      cursor
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

query GetProduct($sku: String!) {
  product(by: {sku: $sku}) {
    id
    title
    sku
    price
    compareAtPrice
    inventoryStatus
    inventoryQuantity
    description
    categoryId
    collectionIds
    images
    metadata
    createdAt
    updatedAt
    version
  }
}

query GetProductById($id: ID!) {
  product(by: {id: $id}) {
    id
    title
    sku
    price
    compareAtPrice
    inventoryStatus
    inventoryQuantity
    description
    categoryId
    collectionIds
    images
    metadata
    createdAt
    updatedAt
    version
  }
}

# Category Queries

query GetCategories {
