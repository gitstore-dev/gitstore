overwrite: true
schema: ../shared/schemas/*.graphqls
documents: 'src/graphql/**/*.graphql'
generates:
  src/graphql/generated.ts:
    plugins:
      - typescript
      - typescript-operations
      - typescript-react-apollo
    config:
      withHooks: true
      withComponent: false
      withHOC: false
      withMutationFn: true
      scalars:
        DateTime: string
        Decimal: string
        JSON: any
      skipTypename: false
      enumsAsTypes: true
      futureProofEnums: true
      dedupeFragments: true
      nonOptionalTypename: true
      avoidOptionals:
        field: false
        inputValue: false
        object: false
        defaultValue: false
