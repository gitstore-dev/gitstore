services:
  git-service:
    image: ghcr.io/gitstore-dev/git-service
    build:
      context: .
      dockerfile: docker/git-service.Dockerfile
    container_name: gitstore-git-service
    ports:
      - "9418:9418"  # Git protocol
      - "8080:8080"  # Websocket notifications
      - "50051:50051"  # gRPC
    volumes:
      - ${GITSTORE_DATA_DIR:-git-data}:/data/repos
    environment:
      - GITSTORE_HTTP_PORT=9418
      - GITSTORE_WS_PORT=8080
      - GITSTORE_GRPC_PORT=50051
      - GITSTORE_DATA_DIR=/data/repos
      - GITSTORE_LOG_LEVEL=info
      - GITSTORE_MAX_FILE_SIZE=52428800
    networks:
      - gitstore-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null --tries=1 --timeout=3 http://127.0.0.1:9418/ 2>&1; test $? -ne 4"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/gitstore-dev/api
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: gitstore-api
    ports:
      - "4000:4000"  # GraphQL API
    depends_on:
      git-service:
        condition: service_healthy
    environment:
      - GITSTORE_API_PORT=4000
      - GITSTORE_GIT_GRPC=git-service:50051
      - GITSTORE_GIT_WS=ws://git-service:8080
      - GITSTORE_GIT_HTTP_URL=http://git-service:9418
      - GITSTORE_AUTH_ADMIN_USERNAME=${GITSTORE_AUTH_ADMIN_USERNAME:-admin}
      - GITSTORE_AUTH_ADMIN_PASSWORD_HASH=${GITSTORE_AUTH_ADMIN_PASSWORD_HASH}
      - GITSTORE_AUTH_JWT_SECRET=${GITSTORE_AUTH_JWT_SECRET}
      - GITSTORE_CACHE_TTL=300
      - GITSTORE_LOG_LEVEL=info
    networks:
      - gitstore-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  git-data:
    driver: local

networks:
  gitstore-network:
    driver: bridge
